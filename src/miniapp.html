<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COIN DIGEST</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #ffffff;
            padding-top: 44px;
            padding-bottom: 80px;
        }

        /* iOS Style Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .header h1 {
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header .status {
            position: absolute;
            right: 16px;
            font-size: 12px;
            color: #4ade80;
        }

        /* Tabs */
        .tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            padding-bottom: 10px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px 12px;
            border-radius: 12px;
            min-width: 60px;
        }

        .tab-item .icon {
            font-size: 24px;
            line-height: 1.2;
        }

        .tab-item .label {
            font-size: 10px;
            margin-top: 2px;
            color: rgba(255, 255, 255, 0.5);
            transition: color 0.3s;
        }

        .tab-item.active .label {
            color: #4ade80;
        }

        .tab-item.active {
            background: rgba(74, 222, 128, 0.1);
        }

        /* Content */
        .content {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .card:active {
            transform: scale(0.98);
        }

        .card .source {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .card .title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .card .description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.5;
        }

        .card .time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 8px;
        }

        /* Calendar */
        .event-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-date {
            min-width: 60px;
            text-align: center;
            margin-right: 16px;
        }

        .event-date .day {
            font-size: 20px;
            font-weight: 700;
            color: #4ade80;
        }

        .event-date .month {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
        }

        .event-info {
            flex: 1;
        }

        .event-info .name {
            font-size: 15px;
            font-weight: 500;
        }

        .event-info .desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }

        .event-badge {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
            margin-left: 8px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.3);
        }

        .loading .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #4ade80;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 0;
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 40px 0;
            color: rgba(255, 255, 255, 0.3);
        }

        .empty .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <h1>⚡ COIN DIGEST</h1>
        <span class="status" id="statusDot">●</span>
    </div>

    <!-- Content -->
    <div class="content">

        <!-- Tab: News -->
        <div id="tab-news" class="tab-content active">
            <div id="news-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка новостей...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Altcoins -->
        <div id="tab-altcoins" class="tab-content">
            <div id="altcoins-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка альткоинов...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Calendar -->
        <div id="tab-calendar" class="tab-content">
            <div id="calendar-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка календаря...</div>
                </div>
            </div>
        </div>

        <!-- Tab: Exclusive -->
        <div id="tab-exclusive" class="tab-content">
            <div id="exclusive-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <div>Загрузка эксклюзива...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab-item active" data-tab="news">
            <span class="icon">📰</span>
            <span class="label">Новости</span>
        </div>
        <div class="tab-item" data-tab="altcoins">
            <span class="icon">📈</span>
            <span class="label">Альткоины</span>
        </div>
        <div class="tab-item" data-tab="calendar">
            <span class="icon">📅</span>
            <span class="label">Календарь</span>
        </div>
        <div class="tab-item" data-tab="exclusive">
            <span class="icon">⭐</span>
            <span class="label">Эксклюзив</span>
        </div>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram?.WebApp;

        if (tg) {
            tg.expand();
            tg.setBackgroundColor('#1a1a2e');
            tg.setHeaderColor('#1a1a2e');
        }

        // API URL
        const API_URL = 'https://newscroopto.nazar-bronnikov22.workers.dev/api';

        // Tab switching
        document.querySelectorAll('.tab-item').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

                this.classList.add('active');
                const tabId = this.dataset.tab;
                document.getElementById(`tab-${tabId}`).classList.add('active');

                // Load data on tab switch
                loadTabData(tabId);
            });
        });

        // Load data
        async function loadTabData(tab) {
            const container = document.getElementById(`${tab}-list`);

            try {
                let data;
                if (tab === 'news') {
                    data = await fetchNews();
                } else if (tab === 'altcoins') {
                    data = await fetchAltcoins();
                } else if (tab === 'calendar') {
                    data = await fetchCalendar();
                } else if (tab === 'exclusive') {
                    data = await fetchExclusive();
                }

                renderData(tab, data, container);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="emoji">😕</div>
                        <div>Ошибка загрузки</div>
                        <div style="font-size:12px;margin-top:8px;">${error.message}</div>
                    </div>
                `;
            }
        }

        // Fetch functions
        async function fetchNews() {
            const response = await fetch(`${API_URL}/news`);
            if (!response.ok) throw new Error('Ошибка загрузки новостей');
            return response.json();
        }

        async function fetchAltcoins() {
            const response = await fetch(`${API_URL}/altcoins`);
            if (!response.ok) throw new Error('Ошибка загрузки альткоинов');
            return response.json();
        }

        async function fetchCalendar() {
            const response = await fetch(`${API_URL}/calendar`);
            if (!response.ok) throw new Error('Ошибка загрузки календаря');
            return response.json();
        }

        async function fetchExclusive() {
            const response = await fetch(`${API_URL}/exclusive`);
            if (!response.ok) throw new Error('Ошибка загрузки эксклюзива');
            return response.json();
        }

        // Render functions
        function renderData(tab, data, container) {
            if (!data || data.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <div class="emoji">📭</div>
                        <div>Нет данных</div>
                    </div>
                `;
                return;
            }

            if (tab === 'news' || tab === 'altcoins') {
                container.innerHTML = data.map(item => `
                    <div class="card" onclick="openUrl('${item.url}')">
                        <div class="source">${item.source || 'Источник'}</div>
                        <div class="title">${item.title || 'Без заголовка'}</div>
                        <div class="description">${item.description || ''}</div>
                        <div class="time">${formatTime(item.publishedAt)}</div>
                    </div>
                `).join('');
            } else if (tab === 'calendar') {
                container.innerHTML = data.map(event => `
                    <div class="event-item">
                        <div class="event-date">
                            <div class="day">${formatDay(event.date)}</div>
                            <div class="month">${formatMonth(event.date)}</div>
                        </div>
                        <div class="event-info">
                            <div class="name">
                                ${event.name}
                                ${event.importance === 'high' ? '<span class="event-badge">🔥 Важно</span>' : ''}
                            </div>
                            <div class="desc">${event.description || ''}</div>
                        </div>
                    </div>
                `).join('');
            } else if (tab === 'exclusive') {
                container.innerHTML = data.map(item => `
                    <div class="card" onclick="openUrl('${item.url}')">
                        <div class="source">⭐ ${item.source || 'Эксклюзив'}</div>
                        <div class="title">${item.title || 'Без заголовка'}</div>
                        <div class="description">${item.description || ''}</div>
                        <div class="time">${formatTime(item.publishedAt)}</div>
                    </div>
                `).join('');
            }
        }

        // Helpers
        function formatTime(date) {
            if (!date) return '';
            const d = new Date(date);
            return d.toLocaleString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatDay(date) {
            if (!date) return '';
            const d = new Date(date);
            return String(d.getDate()).padStart(2, '0');
        }

        function formatMonth(date) {
            if (!date) return '';
            const months = ['Янв', 'Фев', 'Мар', 'Апр', 'Май', 'Июн', 'Июл', 'Авг', 'Сен', 'Окт', 'Ноя', 'Дек'];
            const d = new Date(date);
            return months[d.getMonth()];
        }

        function openUrl(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }

        // Load initial tab
        loadTabData('news');

        // Update status
        document.getElementById('statusDot').textContent = '●';
        document.getElementById('statusDot').style.color = '#4ade80';
    </script>

</body>
</html>
